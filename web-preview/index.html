<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlowAI - Skincare Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --primary-pink: #FADADD;
      --primary-dark: #f0a8b1;
      --secondary-beige: #F5F5DC;
      --white: #FFFFFF;
      --text-dark: #333333;
      --text-light: #7A7A7A;
      --bg-color: #fbfbfb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 850px;
      background-color: var(--white);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Home View */
    .home-view {
      padding: 30px 24px;
      flex: 1;
      overflow-y: auto;
      transition: all 0.3s ease;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .welcome-text h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 36px;
      margin-bottom: 8px;
    }

    .welcome-text p {
      color: var(--text-light);
      margin-bottom: 40px;
      font-size: 16px;
    }

    .input-card {
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(250, 218, 221, 0.5);
      padding: 8px;
      display: flex;
      align-items: center;
      margin-bottom: 40px;
      border: 1px solid var(--primary-pink);
    }

    .input-card input {
      flex: 1;
      border: none;
      padding: 16px 20px;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      background: transparent;
    }

    .send-btn {
      background: var(--primary-pink);
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: var(--text-dark);
      transition: transform 0.2s;
    }
    
    .send-btn:hover { transform: scale(1.05); }

    .suggestions-title {
      font-weight: 600;
      margin-bottom: 16px;
      font-size: 15px;
    }

    .chips-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chip {
      background: var(--secondary-beige);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .chip:hover {
      background: var(--primary-pink);
    }

    /* Chat View */
    .chat-view {
      display: none;
      flex-direction: column;
      height: 100%;
      background: rgba(245, 245, 220, 0.2);
    }

    .chat-header {
      background: var(--white);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      z-index: 10;
    }

    .back-btn {
      font-size: 24px;
      cursor: pointer;
      color: var(--text-dark);
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: var(--primary-pink);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      color: var(--white);
    }

    .header-info h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
    }

    .header-info p {
      font-size: 12px;
      color: #10B981;
      font-weight: 500;
    }

    .chat-body {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble {
      max-width: 85%;
      padding: 16px;
      font-size: 15px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    .bubble-user {
      align-self: flex-end;
      background: var(--primary-pink);
      color: var(--text-dark);
      border-radius: 20px 20px 0 20px;
      box-shadow: 0 4px 10px rgba(250, 218, 221, 0.4);
    }

    .bubble-ai {
      align-self: flex-start;
      background: var(--white);
      color: var(--text-dark);
      border-radius: 20px 20px 20px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
    }

    .ai-section-title {
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--primary-dark);
      margin-top: 12px;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    
    .bubble-ai .ai-section-title:first-child { margin-top: 0; }

    .ai-list {
      margin-left: 16px;
      margin-bottom: 8px;
    }

    .products-carousel {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
      scrollbar-width: none;
    }
    
    .products-carousel::-webkit-scrollbar { display: none; }

    .product-card {
      min-width: 160px;
      background: var(--secondary-beige);
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(250, 218, 221, 0.6);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .product-icon {
      font-size: 24px;
      color: var(--primary-dark);
    }

    .product-name {
      font-weight: 600;
      font-size: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-desc {
      font-size: 11px;
      color: var(--text-light);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .buy-btn {
      margin-top: auto;
      background: var(--white);
      border: 1px solid var(--primary-pink);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dark);
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
    }

    .buy-btn:hover { background: var(--primary-pink); }

    .chat-footer {
      background: var(--white);
      padding: 16px 20px;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.03);
    }

    /* Typing Indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: var(--white);
      padding: 16px 20px;
      border-radius: 20px 20px 20px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
      margin-bottom: 20px;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--primary-dark);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 500px) {
      .app-container { border-radius: 30px; margin: 20px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Home View -->
    <div class="home-view" id="homeView">
      <div class="header-top">
        <div class="logo-text">GlowAI✨</div>
        <i class="ri-user-smile-line" style="font-size: 24px; color: var(--text-light);"></i>
      </div>

      <div class="welcome-text">
        <h1>Hello,<br>Beautiful 👋</h1>
        <p>What's your skin concern today?</p>
      </div>

      <div class="input-card">
        <input type="text" id="homeInput" placeholder="Ask your skin problem..." onkeypress="handleEnter(event)">
        <button class="send-btn" onclick="startChat(document.getElementById('homeInput').value)">
          <i class="ri-send-plane-fill"></i>
        </button>
      </div>

      <div class="suggestions-title">Quick Suggestions</div>
      <div class="chips-wrapper">
        <div class="chip" onclick="startChat('Acne')">Acne</div>
        <div class="chip" onclick="startChat('Oily Skin')">Oily Skin</div>
        <div class="chip" onclick="startChat('Dry Skin')">Dry Skin</div>
        <div class="chip" onclick="startChat('Dark Spots')">Dark Spots</div>
        <div class="chip" onclick="startChat('Anti-Aging')">Anti-Aging</div>
      </div>
    </div>

    <!-- Chat View -->
    <div class="chat-view" id="chatView">
      <div class="chat-header">
        <i class="ri-arrow-left-s-line back-btn" onclick="showHome()"></i>
        <div class="avatar"><i class="ri-sparkling-fill"></i></div>
        <div class="header-info">
          <h3>GlowAI Expert</h3>
          <p>● Online</p>
        </div>
      </div>

      <div class="chat-body" id="chatbox">
        <!-- Messages go here -->
        
        <div class="typing-indicator" id="typingIndicator">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="chat-footer">
        <div class="input-card" style="margin-bottom: 0;">
          <input type="text" id="chatInput" placeholder="Type your message..." onkeypress="handleChatEnter(event)">
          <button class="send-btn" onclick="sendMessage()">
            <i class="ri-send-plane-fill"></i>
          </button>
        </div>
        <p style="font-size: 10px; color: #aaa; text-align: center; margin-top: 8px;">Not medical advice. Consult a dermatologist.</p>
      </div>
    </div>

  </div>

  <script>
    const homeView = document.getElementById('homeView');
    const chatView = document.getElementById('chatView');
    const chatbox = document.getElementById('chatbox');
    const typingIndicator = document.getElementById('typingIndicator');
    const chatInput = document.getElementById('chatInput');

    function showHome() {
      chatView.style.display = 'none';
      homeView.style.display = 'block';
    }

    function startChat(query) {
      if(!query.trim()) return;
      homeView.style.display = 'none';
      chatView.style.display = 'flex';
      sendRequestToBackend(query);
    }

    function handleEnter(e) {
      if(e.key === 'Enter') startChat(e.target.value);
    }

    function handleChatEnter(e) {
      if(e.key === 'Enter') sendMessage();
    }

    function sendMessage() {
      const msg = chatInput.value.trim();
      if(!msg) return;
      
      // Append user msg
      appendUserMsg(msg);
      chatInput.value = '';
      
      sendRequestToBackend(msg);
    }

    function appendUserMsg(text) {
      const div = document.createElement('div');
      div.className = 'bubble bubble-user';
      div.innerText = text;
      chatbox.insertBefore(div, typingIndicator);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function appendAIMsg(data) {
      const div = document.createElement('div');
      div.className = 'bubble bubble-ai';
      
      let html = '';
      
      if(data.analysis) {
        html += `<div class="ai-section-title">Skin Analysis</div>`;
        html += `<p style="margin-bottom: 12px;">${data.analysis}</p>`;
      }
      
      if(data.routine) {
        html += `<div class="ai-section-title">Routine</div>`;
        if(data.routine.morning) html += `<p>☀️ <b>Morning:</b> ${data.routine.morning}</p>`;
        if(data.routine.night) html += `<p>🌙 <b>Night:</b> ${data.routine.night}</p>`;
        html += `<div style="height: 12px;"></div>`;
      }
      
      if(data.tips && Array.isArray(data.tips)) {
        html += `<div class="ai-section-title">Useful Tips</div>`;
        html += `<ul class="ai-list">`;
        data.tips.forEach(t => html += `<li>${t}</li>`);
        html += `</ul>`;
      }
      
      if(data.products && Array.isArray(data.products)) {
        html += `<div class="ai-section-title">Recommended Products</div>`;
        html += `<div class="products-carousel">`;
        data.products.forEach(p => {
          html += `
            <div class="product-card">
              <i class="ri-shopping-bag-3-fill product-icon"></i>
              <div class="product-name">${p.name || 'Product'}</div>
              <div class="product-desc">${p.description || ''}</div>
              <a href="${p.buyLink || '#'}" target="_blank" class="buy-btn">Buy Now</a>
            </div>
          `;
        });
        html += `</div>`;
      }
      
      if(Object.keys(data).length === 0) {
        html += `<p>I couldn't process this right now. Please try again.</p>`;
      }

      div.innerHTML = html;
      chatbox.insertBefore(div, typingIndicator);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    async function sendRequestToBackend(text) {
      // Show user message if not already shown via sendMessage
      if(chatView.style.display !== 'flex') {
        chatView.style.display = 'flex';
      }
      
      // Check if the last bubble is NOT this text (prevents double entry from startChat)
      const bubbles = document.querySelectorAll('.bubble-user');
      const lastUserMsg = bubbles.length > 0 ? bubbles[bubbles.length-1].innerText : '';
      if(lastUserMsg !== text) {
        appendUserMsg(text);
      }

      typingIndicator.style.display = 'flex';
      chatbox.scrollTop = chatbox.scrollHeight;

      try {
        const response = await fetch('http://localhost:5000/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        
        const result = await response.json();
        typingIndicator.style.display = 'none';
        
        if(result.reply) {
          appendAIMsg(result.reply);
        } else {
          appendAIMsg({ analysis: "Sorry, I encountered an error. Please try again." });
        }
      } catch (e) {
        console.error(e);
        typingIndicator.style.display = 'none';
        appendAIMsg({ analysis: "Network error. Make sure the Node.js backend is running on port 5000!" });
      }
    }
  </script>
</body>
</html>
